<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff7ec" />
    <title>For nourhan mohamed</title>
    <link rel="stylesheet" href="nourhan_mohamed.css" />
  </head>
  <body>
    <main
      class="scene"
      id="scene"
      aria-label="A small friendship surprise for nourhan mohamed">
      <canvas id="treeCanvas" aria-hidden="true"></canvas>

      <div
        class="mobile-heart-overlay"
        id="mobileHeartOverlay"
        aria-hidden="true">
        <div class="mobile-heart-core"></div>
      </div>

      <div class="topbar">
        <div class="badge" aria-label="For nourhan mohamed">
          <span class="badge-mark" aria-hidden="true"></span>
 <span>For nourhan mohamed</span>
        </div>
        <button
          class="replay"
          id="replayBtn"
          type="button"
          aria-label="Replay the surprise">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7"></path>
            <path d="M3 4v6h6"></path>
          </svg>
        </button>
      </div>

      <section class="intro" aria-labelledby="introTitle">
        <div class="intro-inner">
          <h1 id="introTitle">nourhan mohamed</h1>
          <p class="mobile-only-line">يارب الهداية تعجب</p>
          <button class="open-btn" id="openBtn" type="button">
            <span>افتحي المفاجأة</span>
            <span class="mini-heart" aria-hidden="true"></span>
          </button>
        </div>
      </section>

      <section class="message" aria-live="polite" aria-labelledby="finalTitle">
        <div class="message-inner">
          <p class="kicker">Three days. One bright hello.</p>
          <div class="message-title" id="finalTitle">nourhan mohamed</div>
        </div>
      </section>
    </main>

    <script>
      (() => {
        const scene = document.getElementById("scene");
        const canvas = document.getElementById("treeCanvas");
        const ctx = canvas.getContext("2d");
        const openBtn = document.getElementById("openBtn");
        const replayBtn = document.getElementById("replayBtn");
        const reduceMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;

        const palette = [
          "#f04874",
          "#ff7a68",
          "#e4a92e",
          "#168982",
          "#8f5cff",
          "#35a7ff",
        ];
        const branchColors = ["#6c3f2d", "#7d4b32", "#925936", "#5f6f43"];
        let dpr = 1;
        let width = 0;
        let height = 0;
        let started = false;
        let startTime = 0;
        let branches = [];
        let hearts = [];
        let skyHearts = [];
        let sparkles = [];
        let bursts = [];
        let balloons = [];
        let rockets = [];
        let explosions = [];
        let rafId = 0;
        let rocketSpawnTimer = 0;
        let lastFrameTime = 0;

        const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
        const lerp = (a, b, t) => a + (b - a) * t;
        const easeOutCubic = (t) => 1 - Math.pow(1 - clamp(t, 0, 1), 3);
        const easeInOut = (t) => {
          t = clamp(t, 0, 1);
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        };
        const easeOutBack = (t) => {
          t = clamp(t, 0, 1);
          const c1 = 1.7;
          const c3 = c1 + 1;
          return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        };

        function seeded(seed) {
          return function next() {
            seed |= 0;
            seed = (seed + 0x6d2b79f5) | 0;
            let value = Math.imul(seed ^ (seed >>> 15), 1 | seed);
            value ^= value + Math.imul(value ^ (value >>> 7), 61 | value);
            return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
          };
        }

        function resize() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          width = Math.floor(window.innerWidth);
          height = Math.floor(window.innerHeight);
          canvas.width = Math.floor(width * dpr);
          canvas.height = Math.floor(height * dpr);
          canvas.style.width = `${width}px`;
          canvas.style.height = `${height}px`;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          buildScene();
          draw(0, performance.now());
        }

        function buildScene() {
          const random = seeded(20260701);
          branches = [];
          hearts = [];
          skyHearts = [];
          sparkles = [];
          balloons = [];
          rockets = [];
          explosions = [];
          rocketSpawnTimer = 0;

          const isMobile = width < 560;
          const baseX = width * 0.5;
          const baseY =
            height + Math.max(20, height * (isMobile ? 0.024 : 0.04));
          const trunkLength = clamp(
            height * (isMobile ? 0.41 : 0.43),
            240,
            430,
          );
          const maxDepth = isMobile ? 6 : 8;

          function addBranch(
            x,
            y,
            length,
            angle,
            lineWidth,
            depth,
            start,
            parentIndex,
          ) {
            const curve = (random() - 0.5) * length * 0.24;
            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;
            const index = branches.length;
            const duration = lerp(0.12, 0.055, (maxDepth - depth) / maxDepth);

            branches.push({
              x,
              y,
              endX,
              endY,
              angle,
              length,
              width: lineWidth,
              depth,
              start,
              duration,
              curve,
              parentIndex,
              color: branchColors[Math.floor(random() * branchColors.length)],
            });

            if (depth <= 0 || lineWidth < 1.1) return index;

            const childCount =
              depth > maxDepth - 2
                ? 2
                : 2 + (random() > (isMobile ? 0.7 : 0.62) ? 1 : 0);
            const spread = lerp(
              isMobile ? 0.62 : 0.78,
              isMobile ? 0.24 : 0.34,
              (maxDepth - depth) / maxDepth,
            );
            const nextBase = start + duration * 0.72;

            for (let i = 0; i < childCount; i += 1) {
              const side = childCount === 2 ? (i === 0 ? -1 : 1) : i - 1;
              const nextAngle =
                angle +
                side * (spread + random() * (isMobile ? 0.12 : 0.24)) +
                (random() - 0.5) * (isMobile ? 0.13 : 0.22);
              const nextLength =
                length *
                lerp(isMobile ? 0.72 : 0.66, isMobile ? 0.84 : 0.78, random());
              const nextWidth =
                lineWidth *
                lerp(isMobile ? 0.69 : 0.64, isMobile ? 0.8 : 0.73, random());
              const nextStart = nextBase + random() * 0.05;
              addBranch(
                endX,
                endY,
                nextLength,
                nextAngle,
                nextWidth,
                depth - 1,
                nextStart,
                index,
              );
            }

            return index;
          }

          addBranch(
            baseX,
            baseY,
            trunkLength,
            -Math.PI / 2,
            clamp(
              width * (isMobile ? 0.045 : 0.035),
              isMobile ? 15 : 14,
              isMobile ? 26 : 24,
            ),
            maxDepth,
            0.02,
            -1,
          );

          branches.forEach((branch, index) => {
            const depthFactor = 1 - branch.depth / maxDepth;
            const isTop = branch.depth <= 2;
            const count = isTop
              ? isMobile
                ? 3
                : 2
              : branch.depth <= 4
                ? isMobile
                  ? 2
                  : 1
                : 0;

            for (let i = 0; i < count; i += 1) {
              const t = clamp(lerp(0.62, 1, random()), 0.1, 1);
              hearts.push({
                branchIndex: index,
                t,
                delay:
                  branch.start +
                  branch.duration * t +
                  random() * 0.18 +
                  depthFactor * 0.1,
                size: lerp(8, isMobile ? 14 : 18, random()),
                color: palette[Math.floor(random() * palette.length)],
                rotate: (random() - 0.5) * 0.9,
                pulse: random() * Math.PI * 2,
              });
            }
          });

          createSkyHearts(random);

          const balloonCount = isMobile ? 3 : 4;
          for (let i = 0; i < balloonCount; i += 1) {
            const x = width * (0.18 + (i + 0.5) * (0.64 / balloonCount));
            const y = height * (0.16 + (i % 2) * 0.08);
            balloons.push({
              baseX: x,
              baseY: y,
              resetX: x,
              resetY: y,
              size: lerp(isMobile ? 18 : 24, isMobile ? 26 : 34, random()),
              color: palette[Math.floor(random() * palette.length)],
              colorDark:
                branchColors[Math.floor(random() * branchColors.length)],
              phase: random() * Math.PI * 2,
              wobble: lerp(10, 28, random()),
              float: lerp(8, 16, random()),
              alive: true,
              reviveAt: 0,
            });
          }

          for (let i = 0; i < 90; i += 1) {
            sparkles.push({
              x: random() * width,
              y: random() * height * 0.76,
              r: lerp(0.6, 2.1, random()),
              delay: random() * 0.8,
              twinkle: lerp(0.7, 1.8, random()),
              color: random() > 0.55 ? "#e4a92e" : "#f04874",
            });
          }
        }

        function createSkyHearts(random) {
          const centerX = width * 0.5;
          const centerY = height * (width < 560 ? 0.3 : 0.32);
          const scale = clamp(Math.min(width, height) * 0.012, 5.8, 10.4);
          const count = width < 520 ? 50 : 72;

          for (let i = 0; i < count; i += 1) {
            const t = (Math.PI * 2 * i) / count;
            const heartX = 16 * Math.pow(Math.sin(t), 3);
            const heartY = -(
              13 * Math.cos(t) -
              5 * Math.cos(2 * t) -
              2 * Math.cos(3 * t) -
              Math.cos(4 * t)
            );
            const wobble = random() * 10 - 5;
            skyHearts.push({
              fromX: width * (0.42 + random() * 0.16),
              fromY: height * (0.9 + random() * 0.08),
              x: centerX + heartX * scale + wobble,
              y: centerY + heartY * scale + (random() * 8 - 4),
              delay: 0.55 + random() * 0.25,
              size: lerp(5.5, width < 520 ? 10 : 12.5, random()),
              color: palette[Math.floor(random() * palette.length)],
              rotate: (random() - 0.5) * 1.1,
              orbit: random() * Math.PI * 2,
            });
          }

          const rays = width < 520 ? 16 : 22;
          for (let i = 0; i < rays; i += 1) {
            const angle = (Math.PI * 2 * i) / rays;
            const radius = clamp(Math.min(width, height) * 0.26, 96, 190);
            skyHearts.push({
              fromX: centerX,
              fromY: height * 0.86,
              x: centerX + Math.cos(angle) * radius,
              y: centerY + Math.sin(angle) * radius * 0.66,
              delay: 0.68 + random() * 0.22,
              size: lerp(4.5, 8, random()),
              color: random() > 0.5 ? "#e4a92e" : "#168982",
              rotate: angle,
              orbit: random() * Math.PI * 2,
            });
          }
        }

        function branchPoint(branch, t) {
          const midX =
            (branch.x + branch.endX) / 2 +
            Math.cos(branch.angle + Math.PI / 2) * branch.curve;
          const midY =
            (branch.y + branch.endY) / 2 +
            Math.sin(branch.angle + Math.PI / 2) * branch.curve;
          const inv = 1 - t;
          return {
            x: inv * inv * branch.x + 2 * inv * t * midX + t * t * branch.endX,
            y: inv * inv * branch.y + 2 * inv * t * midY + t * t * branch.endY,
          };
        }

        function drawBranch(branch, progress) {
          const local = easeOutCubic(
            (progress - branch.start) / branch.duration,
          );
          if (local <= 0) return;

          ctx.save();
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.strokeStyle = branch.color;
          ctx.lineWidth =
            branch.width *
            (width < 560 ? 0.76 + 0.24 * local : 0.72 + 0.28 * local);
          ctx.shadowColor = "rgba(89, 51, 30, 0.14)";
          ctx.shadowBlur = width < 560 ? 6 : 8;
          ctx.beginPath();

          const steps = Math.max(6, Math.ceil(16 * local));
          for (let i = 0; i <= steps; i += 1) {
            const point = branchPoint(branch, local * (i / steps));
            if (i === 0) ctx.moveTo(point.x, point.y);
            else ctx.lineTo(point.x, point.y);
          }

          ctx.stroke();
          ctx.restore();
        }

        function drawHeart(x, y, size, color, rotation, alpha = 1) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rotation);
          ctx.scale(size / 32, size / 32);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = color;
          ctx.shadowColor = "rgba(240, 72, 116, 0.26)";
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.moveTo(0, 9);
          ctx.bezierCurveTo(-21, -7, -14, -26, 0, -15);
          ctx.bezierCurveTo(14, -26, 21, -7, 0, 9);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        function getBalloonPosition(balloon, now) {
          if (!balloon.alive) return null;
          return {
            x:
              balloon.baseX +
              Math.sin(now / 900 + balloon.phase) * balloon.wobble,
            y:
              balloon.baseY +
              Math.cos(now / 1000 + balloon.phase) * balloon.float,
          };
        }

        function drawBalloon(balloon, now) {
          const position = getBalloonPosition(balloon, now);
          if (!position) return;
          const scale = 1 + Math.sin(now / 700 + balloon.phase) * 0.03;
          ctx.save();
          ctx.translate(position.x, position.y);
          ctx.scale(scale, scale);
          const gradient = ctx.createRadialGradient(
            -6,
            -8,
            2,
            0,
            0,
            balloon.size * 0.96,
          );
          gradient.addColorStop(0, "#fff8d8");
          gradient.addColorStop(0.35, balloon.color);
          gradient.addColorStop(1, balloon.colorDark);
          ctx.fillStyle = gradient;
          ctx.shadowColor = "rgba(240, 72, 116, 0.24)";
          ctx.shadowBlur = 18;
          ctx.beginPath();
          ctx.ellipse(
            0,
            0,
            balloon.size * 0.72,
            balloon.size * 0.92,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.74)";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, balloon.size * 0.92);
          ctx.lineTo(0, balloon.size * 1.42);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, balloon.size * 1.42);
          ctx.lineTo(-6, balloon.size * 1.9);
          ctx.stroke();
          ctx.restore();
        }

        function drawBalloons(now) {
          balloons.forEach((balloon) => {
            if (!balloon.alive && now >= balloon.reviveAt) {
              balloon.alive = true;
              balloon.baseX = balloon.resetX;
              balloon.baseY = balloon.resetY;
            }
            if (!balloon.alive) return;
            drawBalloon(balloon, now);
          });
        }

        function drawRocket(x, y, color) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(-Math.PI / 2);
          ctx.fillStyle = color;
          ctx.shadowColor = "rgba(255, 255, 255, 0.8)";
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(-12, 0);
          ctx.lineTo(8, -7);
          ctx.lineTo(8, 7);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#ffd28a";
          ctx.beginPath();
          ctx.moveTo(8, -5);
          ctx.lineTo(20, 0);
          ctx.lineTo(8, 5);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#fff2b2";
          ctx.beginPath();
          ctx.arc(-10, 0, 4.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        function drawRockets(now) {
          rockets = rockets.filter((rocket) => {
            const t = clamp((now - rocket.startTime) / rocket.duration, 0, 1);
            if (t < 1) {
              const x = lerp(rocket.startX, rocket.targetX, easeOutCubic(t));
              const y = lerp(rocket.startY, rocket.targetY, easeOutCubic(t));
              drawRocket(x, y, rocket.color);
              return true;
            }

            if (rocket.targetBalloon?.alive) {
              rocket.targetBalloon.alive = false;
              rocket.targetBalloon.reviveAt = now + 1400 + Math.random() * 900;
              triggerExplosion(rocket.targetX, rocket.targetY, rocket.color);
              triggerExplosion(rocket.targetX, rocket.targetY, "#fff8d8");
            }
            return false;
          });
        }

        function triggerExplosion(x, y, color) {
          explosions.push({
            x,
            y,
            color,
            time: performance.now(),
            particles: Array.from({ length: 24 }, (_, index) => ({
              angle: (Math.PI * 2 * index) / 24 + Math.random() * 0.4,
              distance: 24 + Math.random() * 70,
              size: 4 + Math.random() * 8,
            })),
          });
        }

        function drawExplosions(now) {
          explosions = explosions.filter((explosion) => {
            const age = (now - explosion.time) / 640;
            if (age > 1) return false;
            const t = easeOutCubic(age);
            ctx.save();
            ctx.globalCompositeOperation = "lighter";
            explosion.particles.forEach((particle) => {
              const px =
                explosion.x + Math.cos(particle.angle) * particle.distance * t;
              const py =
                explosion.y +
                Math.sin(particle.angle) * particle.distance * t -
                14 * age;
              const size = particle.size * (1 - age * 0.35);
              ctx.fillStyle = explosion.color;
              ctx.beginPath();
              ctx.arc(px, py, size, 0, Math.PI * 2);
              ctx.fill();
            });
            ctx.restore();
            return true;
          });
        }

        function drawSparkles(progress, now) {
          if (progress < 0.08) return;
          sparkles.forEach((sparkle) => {
            const local = clamp((progress - sparkle.delay * 0.4) / 0.32, 0, 1);
            if (local <= 0) return;
            const alpha =
              local *
              (0.3 +
                0.38 * Math.sin((now / 650) * sparkle.twinkle + sparkle.x));
            ctx.save();
            ctx.globalAlpha = Math.max(0.08, alpha);
            ctx.fillStyle = sparkle.color;
            ctx.translate(sparkle.x, sparkle.y);
            ctx.rotate(now / 2200 + sparkle.x);
            ctx.beginPath();
            ctx.moveTo(0, -sparkle.r * 2.4);
            ctx.lineTo(sparkle.r * 0.8, -sparkle.r * 0.8);
            ctx.lineTo(sparkle.r * 2.4, 0);
            ctx.lineTo(sparkle.r * 0.8, sparkle.r * 0.8);
            ctx.lineTo(0, sparkle.r * 2.4);
            ctx.lineTo(-sparkle.r * 0.8, sparkle.r * 0.8);
            ctx.lineTo(-sparkle.r * 2.4, 0);
            ctx.lineTo(-sparkle.r * 0.8, -sparkle.r * 0.8);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          });
        }

        function drawAttachedHearts(progress, now) {
          hearts.forEach((heart) => {
            const local = easeOutBack((progress - heart.delay) / 0.16);
            if (local <= 0) return;
            const branch = branches[heart.branchIndex];
            const point = branchPoint(branch, heart.t);
            const pulse = 1 + Math.sin(now / 520 + heart.pulse) * 0.06;
            drawHeart(
              point.x,
              point.y,
              heart.size * Math.min(local, 1.16) * pulse,
              heart.color,
              heart.rotate + Math.sin(now / 900 + heart.pulse) * 0.08,
              clamp(local, 0, 1),
            );
          });
        }

        function drawSkyHearts(progress, now) {
          skyHearts.forEach((heart) => {
            const local = easeInOut((progress - heart.delay) / 0.28);
            if (local <= 0) return;
            const float = Math.sin(now / 820 + heart.orbit) * 4;
            const x = lerp(heart.fromX, heart.x, local);
            const y = lerp(heart.fromY, heart.y, local) + float * local;
            drawHeart(
              x,
              y,
              heart.size * easeOutBack(local),
              heart.color,
              heart.rotate + Math.sin(now / 900 + heart.orbit) * 0.1,
              clamp(local, 0, 0.92),
            );
          });
        }

        function drawGround(progress) {
          const rootY = height + 8;
          const blades = Math.floor(width / 18);
          ctx.save();
          ctx.globalAlpha = clamp(progress * 1.4, 0, 1);
          ctx.strokeStyle = "rgba(22, 137, 130, 0.28)";
          ctx.lineWidth = 1.4;
          for (let i = 0; i < blades; i += 1) {
            const x = (i / blades) * width + (i % 2) * 4;
            const bladeH = 16 + (i % 5) * 3;
            ctx.beginPath();
            ctx.moveTo(x, rootY);
            ctx.quadraticCurveTo(
              x + ((i % 3) - 1) * 7,
              rootY - bladeH * 0.55,
              x + (i % 2 ? 6 : -6),
              rootY - bladeH,
            );
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawBursts(now) {
          bursts = bursts.filter((burst) => {
            const age = (now - burst.time) / 900;
            if (age > 1) return false;
            burst.particles.forEach((particle) => {
              const t = easeOutCubic(age);
              drawHeart(
                burst.x + Math.cos(particle.angle) * particle.distance * t,
                burst.y +
                  Math.sin(particle.angle) * particle.distance * t -
                  24 * age,
                particle.size * (1 - age * 0.42),
                particle.color,
                particle.angle + age,
                1 - age,
              );
            });
            return true;
          });
        }

        function draw(progress, now) {
          ctx.clearRect(0, 0, width, height);
          drawSparkles(progress, now);
          drawGround(progress);
          drawBalloons(now);
          drawRockets(now);
          drawExplosions(now);

          branches.forEach((branch) => drawBranch(branch, progress));
          drawAttachedHearts(progress, now);
          drawSkyHearts(progress, now);
          drawBursts(now);
        }

        function animate(now) {
          if (!lastFrameTime) {
            lastFrameTime = now;
          }

          const delta = Math.min(40, now - lastFrameTime);
          lastFrameTime = now;

          if (!started) {
            draw(0, now);
            rafId = requestAnimationFrame(animate);
            return;
          }

          rocketSpawnTimer -= delta;
          if (rocketSpawnTimer <= 0) {
            spawnRocket(now);
            rocketSpawnTimer = 1200 + Math.random() * 700;
          }

          const duration = reduceMotion ? 1400 : 7800;
          const elapsed = now - startTime;
          const progress = clamp(elapsed / duration, 0, 1);
          draw(progress, now);

          if (progress > 0.78) {
            scene.classList.add("complete");
          }

          rafId = requestAnimationFrame(animate);
        }

        function tinyChime() {
          try {
            const AudioContext =
              window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const audio = new AudioContext();
            const master = audio.createGain();
            master.gain.value = 0.05;
            master.connect(audio.destination);

            [523.25, 659.25, 783.99].forEach((freq, index) => {
              const osc = audio.createOscillator();
              const gain = audio.createGain();
              osc.type = "sine";
              osc.frequency.value = freq;
              gain.gain.setValueAtTime(0, audio.currentTime);
              gain.gain.linearRampToValueAtTime(
                0.7,
                audio.currentTime + 0.025 + index * 0.035,
              );
              gain.gain.exponentialRampToValueAtTime(
                0.001,
                audio.currentTime + 0.55 + index * 0.055,
              );
              osc.connect(gain);
              gain.connect(master);
              osc.start(audio.currentTime + index * 0.035);
              osc.stop(audio.currentTime + 0.64 + index * 0.055);
            });
          } catch (error) {
            // Audio is decorative; the page works perfectly without it.
          }
        }

        function burstAt(x, y) {
          const random = seeded(
            Math.floor(x * 31 + y * 17 + performance.now()),
          );
          const particles = Array.from({ length: 15 }, (_, index) => ({
            angle: (Math.PI * 2 * index) / 15 + random() * 0.24,
            distance: 32 + random() * 72,
            size: 7 + random() * 9,
            color: palette[Math.floor(random() * palette.length)],
          }));
          bursts.push({ x, y, time: performance.now(), particles });
        }

        function spawnRocket(now) {
          const activeBalloons = balloons.filter((balloon) => balloon.alive);
          if (!activeBalloons.length) return;
          const targetBalloon =
            activeBalloons[Math.floor(Math.random() * activeBalloons.length)];
          const target = getBalloonPosition(targetBalloon, now);
          if (!target) return;

          rockets.push({
            startX: width * (0.15 + Math.random() * 0.7),
            startY: height + 70,
            targetX: target.x,
            targetY: target.y,
            startTime: now,
            duration: 900 + Math.random() * 260,
            color: palette[Math.floor(Math.random() * palette.length)],
            targetBalloon,
          });
        }

        function start() {
          scene.classList.remove("complete");
          scene.classList.add("started");
          started = true;
          startTime = performance.now();
          bursts = [];
          rockets = [];
          explosions = [];
          rocketSpawnTimer = 500;
          if (width < 720) {
            burstAt(width * 0.5, height * 0.3);
          }
          tinyChime();
        }

        function replay() {
          scene.classList.remove("complete");
          startTime = performance.now();
          bursts = [];
          rockets = [];
          explosions = [];
          rocketSpawnTimer = 500;
          if (width < 720) {
            burstAt(width * 0.5, height * 0.3);
          }
        }

        function addBurst(event) {
          if (!started) return;
          const rect = canvas.getBoundingClientRect();
          const x = event.clientX - rect.left;
          const y = event.clientY - rect.top;
          burstAt(x, y);
        }

        openBtn.addEventListener("click", start);
        replayBtn.addEventListener("click", replay);
        canvas.addEventListener("pointerdown", addBurst);
        window.addEventListener("resize", resize);
        resize();
        rafId = requestAnimationFrame(animate);
        window.addEventListener("beforeunload", () =>
          cancelAnimationFrame(rafId),
        );
      })();
    </script>
  </body>
</html>
